<div class="auth-page">
  <mat-card class="auth-card">
    <h2>Reset Password</h2>

    <mat-form-field class="full-width">
      <input matInput placeholder="Email" [(ngModel)]="model.email">
    </mat-form-field>

    <mat-form-field class="full-width">
      <input matInput type="password" placeholder="New Password" [(ngModel)]="model.newPassword">
    </mat-form-field>

    <mat-form-field class="full-width">
      <input matInput type="password" placeholder="Confirm Password" [(ngModel)]="model.confirmPassword">
    </mat-form-field>

    @if(message){ <p class="success">{{message}}</p> }
    @if(errorMessage){ <p class="error">{{errorMessage}}</p> }

    <button mat-raised-button color="primary" class="full-width" (click)="reset()">
      Reset
    </button>
  </mat-card>
</div>
