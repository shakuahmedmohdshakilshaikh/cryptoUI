<div class="auth-page">
  <mat-card class="auth-card">
    <h2>Reset Password</h2>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput [(ngModel)]="model.email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>OTP</mat-label>
      <input matInput [(ngModel)]="model.otp" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput type="password" [(ngModel)]="model.newPassword" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" [(ngModel)]="model.confirmPassword" />
    </mat-form-field>

    @if (message) {
      <p class="success">{{ message }}</p>
    }

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <button mat-raised-button color="primary" class="full-width" (click)="reset()">
      Reset Password
    </button>
  </mat-card>
</div>
